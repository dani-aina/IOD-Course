<!DOCTYPE html>
<html>

<head>
</head>

<body>
  <header>
    <nav>
      <!-- works like <a href="/index.html">Home</a> -->
      <a href="index.html">Home</a>
      <a href="form.html"></a>
    </nav>
    <form>
      <div>
        <label for="firstName">First Name:</label><br>
        <input type="text" name="firstName"><br><br>
      </div>
      <div>
        <label for="lastName">Last Name:</label><br>
        <input type="text" name="lastName"><br><br>
      </div>
      <div>
        <label for="favouriteLang">Choose your favourite language:</label><br>
        <input type="radio" name="language" value="HTML">
        <label for="HTML">HTML</label><br>

        <input type="radio" name="language" value="CSS">
        <label for="CSS">CSS</label><br>

        <input type="radio" name="language" value="JavaScript">
        <label for="JavaScript">JavaScript</label><br><br>
      </div>
      <div>
        <label for="vehicleType">Choose your vehicle type:</label><br>
        <input type="checkbox" name="vehicle" value="motorbike">
        <label for="motorbike">Motorbike</label><br>
        <input type="checkbox" name="vehicle" value="bike">
        <label for="bike">Bike</label><br>
        <input type="checkbox" name="vehicle" value="car">
        <label for="car">Car</label><br>
        <label for="chooseCar">Choose brand of car:</label>
        <select id="chooseCar" name="chooseCar">
          <option value="" disabled selected>Brand of car</option>
          <option>Mazda</option>
          <option>Suzuki</option>
          <option>Toyota</option>
          <option>Audi</option>
          <option>Fiat</option>
          <option>BMW</option>
        </select>
      </div>


      <button type="submit">Submit form</button>
    </form>

  </header>

  <main>
  </main>

  <footer>Copyright &copy; 2024</footer>
</body>

</html>
